<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI Race Arena Live - Premium 3D Arcade Racing</title>
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Fullscreen Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    
    <!-- iOS / Android Home Screen Launcher Icons -->
    <link rel="apple-touch-icon" href="/app_icon_192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/app_icon_512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/app_icon_192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/app_icon_512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </body>
</html>
